<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="m1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f0f0f0"/>
    <stop offset="15%" stop-color="#e8e8ec"/>
    <stop offset="30%" stop-color="#d0d0d8"/>
    <stop offset="40%" stop-color="#fafafe"/>
    <stop offset="50%" stop-color="#c8c8d4"/>
    <stop offset="60%" stop-color="#f4f4fa"/>
    <stop offset="75%" stop-color="#b8b8c8"/>
    <stop offset="85%" stop-color="#e0e0ea"/>
    <stop offset="100%" stop-color="#a8a8b8"/>
  </linearGradient>
  <linearGradient id="m2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#c0c0cc"/>
    <stop offset="20%" stop-color="#f8f8ff"/>
    <stop offset="40%" stop-color="#b0b0c0"/>
    <stop offset="50%" stop-color="#fefeff"/>
    <stop offset="65%" stop-color="#c8c8d8"/>
    <stop offset="80%" stop-color="#f0f0f8"/>
    <stop offset="100%" stop-color="#a8a8b8"/>
  </linearGradient>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#06B6D4"/>
  </linearGradient>
  <linearGradient id="spec" x1="0.3" y1="0" x2="0.7" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
    <stop offset="40%" stop-color="#ffffff" stop-opacity="0.08"/>
    <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.12"/>
  </linearGradient>
  <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
  </filter>
</defs>
  <g transform="translate(40,0) scale(0.8)">

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#m2)" stroke-width="3" filter="url(#sh)"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#spec)" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#m1)" stroke-width="1" opacity="0.6"/>
  
  <!-- North -->
  <polygon points="100,30 93,80 100,70 107,80" fill="url(#m1)" filter="url(#sh)"/>
  <polygon points="100,30 96,72 100,64 104,72" fill="url(#spec)"/>
  <!-- South -->
  <polygon points="100,170 107,120 100,130 93,120" fill="url(#m2)" filter="url(#sh)" opacity="0.85"/>
  <polygon points="100,170 104,128 100,136 96,128" fill="url(#spec)"/>
  <!-- East -->
  <polygon points="170,100 120,93 130,100 120,107" fill="url(#m1)" filter="url(#sh)" opacity="0.85"/>
  <polygon points="170,100 128,96 136,100 128,104" fill="url(#spec)"/>
  <!-- West -->
  <polygon points="30,100 80,107 70,100 80,93" fill="url(#m2)" filter="url(#sh)" opacity="0.85"/>
  <polygon points="30,100 72,104 64,100 72,96" fill="url(#spec)"/>
  
  <!-- Intercardinals -->
  <polygon points="148,52 118,82 124,80 122,86" fill="url(#m1)" opacity="0.7"/>
  <polygon points="148,148 118,118 124,120 122,114" fill="url(#m2)" opacity="0.7"/>
  <polygon points="52,148 82,118 80,124 86,122" fill="url(#m1)" opacity="0.7"/>
  <polygon points="52,52 82,82 80,80 86,78" fill="url(#m2)" opacity="0.7"/>
  
  <!-- Centre hub - silver -->
  <circle cx="100" cy="100" r="22" fill="url(#m1)" filter="url(#sh)"/>
  <circle cx="100" cy="100" r="22" fill="url(#spec)"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.3"/>
  
  <!-- Graduation cap - purple with teal tassel -->
  <polygon points="100,91 115,98 100,103 85,98" fill="#7C3AED"/>
  <rect x="91" y="103" width="18" height="3" rx="0.5" fill="#5B21B6"/>
  <line x1="115" y1="98" x2="119" y2="107" stroke="#06B6D4" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="119" cy="108.5" r="1.5" fill="#06B6D4"/>
  
  <!-- North Star -->
  <polygon points="100,20 102,25 107,25 103,28 104.5,33 100,30 95.5,33 97,28 93,25 98,25" fill="#ffffff"/>
  
  <!-- N E S W -->
  <text x="100" y="46" text-anchor="middle" font-size="7" font-weight="700" letter-spacing="1" fill="#e0e0ec" font-family="Century Gothic, Poppins, sans-serif">N</text>
  <text x="100" y="162" text-anchor="middle" font-size="7" font-weight="700" letter-spacing="1" fill="#c0c0cc" opacity="0.7" font-family="Century Gothic, Poppins, sans-serif">S</text>
  <text x="155" y="103" text-anchor="middle" font-size="7" font-weight="700" letter-spacing="1" fill="#c0c0cc" opacity="0.7" font-family="Century Gothic, Poppins, sans-serif">E</text>
  <text x="45" y="103" text-anchor="middle" font-size="7" font-weight="700" letter-spacing="1" fill="#c0c0cc" opacity="0.7" font-family="Century Gothic, Poppins, sans-serif">W</text>
  
  <!-- Subtle highlight arc -->
  <path d="M 55,55 Q 100,40 145,55" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.1"/>

  </g>
  <text x="120" y="185" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="url(#bg)" font-family="Century Gothic, Poppins, sans-serif">SCHOLARSHIP</text>
  <text x="120" y="203" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="url(#bg)" font-family="Century Gothic, Poppins, sans-serif">SEARCHER</text>
  <text x="120" y="222" text-anchor="middle" font-size="5.5" font-weight="600" letter-spacing="2.5" fill="#c0c0cc" font-family="Century Gothic, Poppins, sans-serif">EVERY SCHOOL. EVERY OPPORTUNITY.</text>
</svg>
